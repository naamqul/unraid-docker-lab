- Control Plane:
    - Homepage:
        icon: /android-chrome-512x512.png
        href: https://home.arc.home.arpa
        description: Arc command center
        server: arc-docker
        container: homepage
    - Unraid:
        icon: unraid.svg
        href: https://unraid.arc.home.arpa
        description: Storage, shares, VMs, and Docker
    - Komodo:
        icon: komodo.svg
        href: https://komodo.arc.home.arpa
        description: Compose and deployment control
        server: arc-docker
        container: komodo
    - Beszel:
        icon: beszel.svg
        href: https://beszel.arc.home.arpa
        description: Live Arc health and resource telemetry
        server: arc-docker
        container: beszel
        widget:
          type: beszel
          url: http://beszel:8090
          username: "{{HOMEPAGE_VAR_BESZEL_USERNAME}}"
          password: "{{HOMEPAGE_VAR_BESZEL_PASSWORD}}"
          systemId: 1w33yp4lkbr402o
          version: 2
          fields:
            - cpu
            - memory
            - disk
            - network

