name: general

services:
  general-gluetun:
    container_name: general-gluetun
    image: qmcgaw/gluetun:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER:-protonvpn}
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: United States
      SERVER_CITIES: Los Angeles
      FIREWALL_INPUT_PORTS: 5800,8080
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - /mnt/user/appdata/general-gluetun-state:/gluetun
    networks:
      - default
      - caddy-backend

  jdownloader-2:
    container_name: jdownloader-2
    image: jlesage/jdownloader-2:latest
    restart: unless-stopped
    depends_on:
      general-gluetun:
        condition: service_healthy
        restart: true
    network_mode: service:general-gluetun
    environment:
      USER_ID: 99
      GROUP_ID: 100
      UMASK: "0002"
      TZ: ${TZ:-America/Los_Angeles}
      DARK_MODE: 1
      VNC_LISTENING_PORT: -1
      SECURE_CONNECTION: 1
      WEB_AUTHENTICATION: 1
      WEB_AUTHENTICATION_USERNAME: ${JDOWNLOADER_WEB_USERNAME:-arc}
      WEB_AUTHENTICATION_PASSWORD: ${JDOWNLOADER_WEB_PASSWORD:?Set JDOWNLOADER_WEB_PASSWORD in .env}
    volumes:
      - /mnt/user/appdata/jdownloader-state:/config
      - /mnt/user/booty/downloads:/output

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    depends_on:
      general-gluetun:
        condition: service_healthy
        restart: true
    network_mode: service:general-gluetun
    environment:
      SEARXNG_BASE_URL: https://searxng.arc.home.arpa/
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_PORT: 8080
      SEARXNG_SECRET: ${SEARXNG_SECRET:?Set SEARXNG_SECRET in .env}
      FORCE_OWNERSHIP: "false"
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - /mnt/user/appdata/searxng-state/cache:/var/cache/searxng

  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    depends_on:
      - dockerproxy
    environment:
      HOMEPAGE_ALLOWED_HOSTS: home.arc.home.arpa,homepage.arc.home.arpa
      HOMEPAGE_VAR_BESZEL_USERNAME: ${HOMEPAGE_BESZEL_USERNAME:?Set HOMEPAGE_BESZEL_USERNAME in .env}
      HOMEPAGE_VAR_BESZEL_PASSWORD: ${HOMEPAGE_BESZEL_PASSWORD:?Set HOMEPAGE_BESZEL_PASSWORD in .env}
      LOG_TARGETS: stdout
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ./homepage:/app/config:ro
      - ./homepage/images:/app/public/images:ro
    networks:
      - caddy-backend
      - homepage-docker

  dockerproxy:
    container_name: homepage-dockerproxy
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      INFO: 1
      SERVICES: 0
      TASKS: 0
      POST: 0
      LOG_LEVEL: warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - homepage-docker

  beszel:
    container_name: beszel
    image: henrygd/beszel:0.18.7
    restart: unless-stopped
    environment:
      APP_URL: https://beszel.arc.home.arpa
      CHECK_UPDATES: "true"
    ports:
      - 127.0.0.1:8090:8090
    volumes:
      - /mnt/user/appdata/beszel-state/data:/beszel_data
      - /mnt/user/appdata/beszel-state/socket:/beszel_socket
    networks:
      - default
      - caddy-backend

  # Enable after creating the first Beszel account and adding Arc in the Hub.
  # Set BESZEL_AGENT_KEY, BESZEL_AGENT_TOKEN, and COMPOSE_PROFILES=beszel-agent
  # in .env, then redeploy this stack. Use /beszel_socket/beszel.sock as Host/IP.
  beszel-dockerproxy:
    container_name: beszel-dockerproxy
    image: ghcr.io/wollomatic/socket-proxy:1.12.3
    restart: unless-stopped
    profiles:
      - beszel-agent
    network_mode: none
    user: "0:0"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      SP_PROXYSOCKETENDPOINT: /beszel-docker-api/docker.sock
      SP_PROXYSOCKETENDPOINTFILEMODE: "0600"
      SP_ALLOW_GET: '/(v[0-9.]+/)?(version|info|containers/.*)'
      SP_LOGLEVEL: WARN
      SP_WATCHDOGINTERVAL: "60"
      SP_STOPONWATCHDOG: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - beszel-docker-api:/beszel-docker-api

  beszel-agent:
    container_name: beszel-agent
    image: henrygd/beszel-agent:0.18.7
    restart: unless-stopped
    profiles:
      - beszel-agent
    network_mode: host
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    depends_on:
      beszel-dockerproxy:
        condition: service_started
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://127.0.0.1:8090
      DOCKER_HOST: unix:///beszel-docker-api/docker.sock
      KEY: ${BESZEL_AGENT_KEY:-UPDATE_ME}
      TOKEN: ${BESZEL_AGENT_TOKEN:-UPDATE_ME}
    volumes:
      - /mnt/user/appdata/beszel-agent-state:/var/lib/beszel-agent
      - /mnt/user/appdata/beszel-state/socket:/beszel_socket
      - beszel-docker-api:/beszel-docker-api:ro
    tmpfs:
      - /tmp

  filebrowser:
    container_name: filebrowser
    image: gtstef/filebrowser:stable
    restart: unless-stopped
    user: "99:100"
    cap_add:
      - NET_BIND_SERVICE
    environment:
      FILEBROWSER_CONFIG: /config/config.yaml
      FILEBROWSER_DATABASE: /home/filebrowser/data/database.db
      FILEBROWSER_ADMIN_PASSWORD: ${FILEBROWSER_ADMIN_PASSWORD:?Set FILEBROWSER_ADMIN_PASSWORD in .env}
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ./filebrowser/config.yaml:/config/config.yaml:ro
      - /mnt/user/appdata/filebrowser:/home/filebrowser/data
      - /mnt/user/filebrowser/files:/files
      - /mnt/user/booty:/files/stash
    networks:
      - default
      - caddy-backend

  termix:
    container_name: termix
    image: ghcr.io/lukegus/termix:2.5.1
    restart: unless-stopped
    command:
      - /bin/sh
      - -c
      - umask 077 && exec /entrypoint.sh
    depends_on:
      termix-guacd:
        condition: service_started
    environment:
      PORT: "8080"
      DATA_DIR: /app/data
      ENABLE_SSL: "false"
      ENABLE_GUACAMOLE: "true"
      GUACD_HOST: termix-guacd
      GUACD_PORT: "4822"
      DB_FILE_ENCRYPTION: "true"
      ALLOW_PASSWORD_RESET: "false"
      ALLOW_REGISTRATION: "false"
      PUID: "99"
      PGID: "100"
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - /mnt/user/appdata/termix-state:/app/data
    networks:
      caddy-backend:
      termix-private:
        ipv4_address: 172.23.0.10

  termix-guacd:
    container_name: termix-guacd
    image: guacamole/guacd:1.6.0
    restart: unless-stopped
    networks:
      termix-private:
        ipv4_address: 172.23.0.11
      # Guacd needs outbound reachability to Forge's LAN address for RDP, but
      # its control port remains reachable only through termix-private.
      termix-egress:

networks:
  caddy-backend:
    name: caddy-backend
    external: true
  homepage-docker:
    name: homepage-docker
    internal: true
  termix-private:
    name: termix-private
    external: true
  termix-egress:
    name: termix-egress
    driver: bridge

volumes:
  beszel-docker-api:
    name: beszel-docker-api
