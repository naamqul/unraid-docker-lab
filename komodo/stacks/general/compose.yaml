name: general

services:
  general-gluetun:
    container_name: general-gluetun
    image: qmcgaw/gluetun:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER:-protonvpn}
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: United States
      SERVER_CITIES: Los Angeles
      FIREWALL_INPUT_PORTS: 5800,8080
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - /mnt/user/appdata/general-gluetun-state:/gluetun
    networks:
      - default
      - caddy-backend

  jdownloader-2:
    container_name: jdownloader-2
    image: jlesage/jdownloader-2:latest
    restart: unless-stopped
    depends_on:
      general-gluetun:
        condition: service_healthy
    network_mode: service:general-gluetun
    environment:
      USER_ID: 99
      GROUP_ID: 100
      UMASK: "0002"
      TZ: ${TZ:-America/Los_Angeles}
      DARK_MODE: 1
      VNC_LISTENING_PORT: -1
      SECURE_CONNECTION: 1
      WEB_AUTHENTICATION: 1
      WEB_AUTHENTICATION_USERNAME: ${JDOWNLOADER_WEB_USERNAME:-arc}
      WEB_AUTHENTICATION_PASSWORD: ${JDOWNLOADER_WEB_PASSWORD:?Set JDOWNLOADER_WEB_PASSWORD in .env}
    volumes:
      - /mnt/user/appdata/jdownloader-state:/config
      - /mnt/user/booty/downloads:/output

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    depends_on:
      general-gluetun:
        condition: service_healthy
    network_mode: service:general-gluetun
    environment:
      SEARXNG_BASE_URL: https://searxng.arc.home.arpa/
      SEARXNG_BIND_ADDRESS: 0.0.0.0
      SEARXNG_PORT: 8080
      SEARXNG_SECRET: ${SEARXNG_SECRET:?Set SEARXNG_SECRET in .env}
      FORCE_OWNERSHIP: "false"
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
      - /mnt/user/appdata/searxng-state/cache:/var/cache/searxng

  homepage:
    container_name: homepage
    image: ghcr.io/gethomepage/homepage:latest
    restart: unless-stopped
    depends_on:
      - dockerproxy
    environment:
      HOMEPAGE_ALLOWED_HOSTS: home.arc.home.arpa,homepage.arc.home.arpa
      LOG_TARGETS: stdout
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ./homepage:/app/config:ro
      - ./homepage/images:/app/public/images:ro
    networks:
      - default
      - caddy-backend

  dockerproxy:
    container_name: homepage-dockerproxy
    image: ghcr.io/tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      INFO: 1
      SERVICES: 0
      TASKS: 0
      POST: 0
      LOG_LEVEL: warning
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default

  beszel:
    container_name: beszel
    image: henrygd/beszel:latest
    restart: unless-stopped
    environment:
      APP_URL: https://beszel.arc.home.arpa
      CHECK_UPDATES: "true"
    ports:
      - 127.0.0.1:8090:8090
    volumes:
      - /mnt/user/appdata/beszel-state/data:/beszel_data
      - /mnt/user/appdata/beszel-state/socket:/beszel_socket
    networks:
      - default
      - caddy-backend

  # Enable after creating the first Beszel account and adding Arc in the Hub.
  # Set BESZEL_AGENT_KEY, BESZEL_AGENT_TOKEN, and COMPOSE_PROFILES=beszel-agent
  # in .env, then redeploy this stack. Use /beszel_socket/beszel.sock as Host/IP.
  beszel-agent:
    container_name: beszel-agent
    image: henrygd/beszel-agent:latest
    restart: unless-stopped
    profiles:
      - beszel-agent
    network_mode: host
    environment:
      LISTEN: /beszel_socket/beszel.sock
      HUB_URL: http://127.0.0.1:8090
      KEY: ${BESZEL_AGENT_KEY:-UPDATE_ME}
      TOKEN: ${BESZEL_AGENT_TOKEN:-UPDATE_ME}
    volumes:
      - /mnt/user/appdata/beszel-agent-state:/var/lib/beszel-agent
      - /mnt/user/appdata/beszel-state/socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/user/booty:/extra-filesystems/booty:ro

  filebrowser:
    container_name: filebrowser
    image: gtstef/filebrowser:stable
    restart: unless-stopped
    user: "99:100"
    cap_add:
      - NET_BIND_SERVICE
    environment:
      FILEBROWSER_CONFIG: /config/config.yaml
      FILEBROWSER_DATABASE: /home/filebrowser/data/database.db
      FILEBROWSER_ADMIN_PASSWORD: ${FILEBROWSER_ADMIN_PASSWORD:?Set FILEBROWSER_ADMIN_PASSWORD in .env}
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - ./filebrowser/config.yaml:/config/config.yaml:ro
      - /mnt/user/appdata/filebrowser:/home/filebrowser/data
      - /mnt/user/booty:/stash
    networks:
      - default
      - caddy-backend

networks:
  caddy-backend:
    name: caddy-backend
    external: true
