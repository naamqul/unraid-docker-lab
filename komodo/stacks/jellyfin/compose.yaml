name: jellyfin

services:
  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin:${JELLYFIN_IMAGE_TAG:-10}
    user: "99:100"
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "8096:8096/tcp"
      - "7359:7359/udp"
    environment:
      JELLYFIN_PublishedServerUrl: https://jellyfin.arc.home.arpa
      TZ: America/Los_Angeles
    volumes:
      - /mnt/user/appdata/jellyfin-state/config:/config
      - /mnt/user/appdata/jellyfin-state/cache:/cache
      - type: bind
        source: /mnt/user/booty
        target: /media
        read_only: true
    networks:
      - default
      - caddy-backend

networks:
  caddy-backend:
    name: caddy-backend
    external: true
