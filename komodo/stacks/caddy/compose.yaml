name: caddy

services:
  caddy:
    container_name: caddy
    image: arc-caddy-porkbun:2.11.4
    pull_policy: build
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      CADDY_LAN_IP: ${CADDY_LAN_IP}
      PORKBUN_API_KEY: ${PORKBUN_API_KEY:?Set PORKBUN_API_KEY in .env}
      PORKBUN_API_SECRET_KEY: ${PORKBUN_API_SECRET_KEY:?Set PORKBUN_API_SECRET_KEY in .env}
    depends_on:
      - unraid-webui-bridge
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_STATE_PATH}/data:/data
      - ${CADDY_STATE_PATH}/config:/config
    networks:
      lan:
        ipv4_address: ${CADDY_LAN_IP}
        mac_address: ${CADDY_LAN_MAC}
      caddy-backend:
        # Keep this stable so Jellyfin can trust only Caddy, not every
        # container attached to the shared backend network.
        ipv4_address: ${CADDY_BACKEND_IP:-172.20.0.10}
    labels:
      net.unraid.docker.webui: "https://caddy.arc.bonfireboogie.com/"

  unraid-webui-bridge:
    container_name: unraid-webui-bridge
    image: caddy:2.11.4
    restart: unless-stopped
    command:
      - caddy
      - reverse-proxy
      - --from
      - :8080
      - --to
      - http://192.168.50.51:80
    networks:
      - caddy-backend

networks:
  lan:
    name: br0
    external: true
  caddy-backend:
    name: caddy-backend
    external: true
