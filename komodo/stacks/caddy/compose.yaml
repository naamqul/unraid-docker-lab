name: caddy

services:
  caddy:
    container_name: caddy
    image: caddy:2
    restart: unless-stopped
    environment:
      CADDY_LAN_IP: ${CADDY_LAN_IP}
    depends_on:
      - unraid-webui-bridge
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_STATE_PATH}/data:/data
      - ${CADDY_STATE_PATH}/config:/config
    networks:
      lan:
        ipv4_address: ${CADDY_LAN_IP}
        mac_address: ${CADDY_LAN_MAC}
      caddy-backend:
    labels:
      net.unraid.docker.webui: "https://caddy.arc.home.arpa/"

  unraid-webui-bridge:
    container_name: unraid-webui-bridge
    image: caddy:2
    restart: unless-stopped
    command:
      - caddy
      - reverse-proxy
      - --from
      - :8080
      - --to
      - http://192.168.50.51:80
    networks:
      - caddy-backend

networks:
  lan:
    name: br0
    external: true
  caddy-backend:
    name: caddy-backend
    external: true
